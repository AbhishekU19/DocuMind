services:
  app:
    build: .
    container_name: aichatbot-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aichatbot
      DB_USERNAME: aichatbot
      DB_PASSWORD: ${DB_PASSWORD:-aichatbot_secret}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-make-it-at-least-64-characters-long}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aichatbot-postgres
    environment:
      POSTGRES_DB: aichatbot
      POSTGRES_USER: aichatbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aichatbot_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
