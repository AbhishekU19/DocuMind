spring:
  application:
    name: ai-chatbot

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aichatbot}
    username: ${DB_USERNAME:aichatbot}
    password: ${DB_PASSWORD:aichatbot_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2048
      embedding:
        options:
          model: text-embedding-3-small

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  ai.vectorstore.pgvector:
    index-type: HNSW
    distance-type: COSINE_DISTANCE
    dimensions: 1536
    initialize-schema: true

app:
  jwt:
    secret: ${JWT_SECRET:m3yS3cr3tK3yTh4tIsL0ngEn0ughF0rHS512Alg0r1thm2026SecureKey!}
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days
  rate-limit:
    requests-per-minute: 20
    tokens-per-day: 100000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.daoninhthai.aichatbot: DEBUG
    org.springframework.ai: INFO
    org.springframework.security: INFO
